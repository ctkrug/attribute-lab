<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attribute Lab — watch htmx happen</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a1826'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='20' font-weight='700' fill='%235ec8f2' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1 class="wordmark">Attribute Lab</h1>
    <p class="tagline">Click an hx-* preset. Watch the request and the DOM patch happen.</p>
  </header>

  <main id="lab-root">
    <p>Scaffold placeholder — the preset picker, network panel, and DOM patch
      panel land in the build phase. See <code>docs/VISION.md</code> and
      <code>docs/BACKLOG.md</code> for the plan.</p>
    <button id="demo-button" hx-get="/api/demo" hx-target="#demo-output" hx-swap="innerHTML">
      Fire demo request
    </button>
    <div id="demo-output"></div>
  </main>
</body>
</html>
